<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple One Page Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;

      /* Centers content on the page */
      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: row;
      align-items: center;

      gap: 30px;

      max-width: 800px;
      width: 90%;
    }

    .container img {
      width: 180px;
      height: auto;

      border-radius: 10px;
      object-fit: cover;
    }

    .text {
      flex: 1;
    }

    .text h1 {
      margin-top: 0;
      color: #333;
    }

    .text p {
      color: #555;
      line-height: 1.6;
    }

    /* Mobile layout */
    @media (max-width: 700px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .container img {
        width: 150px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="your-photo.jpg" alt="Your Photo">

    <div class="text">
      <h1>Your Title</h1>

      <p>
        This is your paragraph text. Replace this with your own content.
        The image and text are centered on a clean white background
        without any visible box or shadow.
      </p>
    </div>

  </div>

</body>
</html>
